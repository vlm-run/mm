name: auto-tag on version bump

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Check out with a PAT so the pushed tag triggers downstream workflows
      # (publish.yml). The default GITHUB_TOKEN cannot trigger workflow runs
      # — see https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Extract version and create tag if new
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=${VERSION} tag=${TAG}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin — skipping"
            exit 0
          fi

          git config --global user.email "sudeep@vlm.run"
          git config --global user.name "Sudeep Pillai"

          echo "Creating tag ${TAG}"
          git tag "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
