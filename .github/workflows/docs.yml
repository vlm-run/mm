name: deploy docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/docs_hooks.py"
      - ".github/workflows/docs.yml"

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install mkdocs
        run: pip install "mkdocs>=1.6" "mkdocs-material>=9.5"
      - name: Build site
        run: mkdocs build
      - name: Deploy to GitHub Pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: .
          keep_files: true
