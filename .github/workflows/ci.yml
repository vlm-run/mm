name: CI

on:
  pull_request:
    paths:
      - "python/mm/**"
      - "tests/python/**"
      - "pyproject.toml"
      - "crates/**"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "python/mm/**"
      - "pyproject.toml"
      - "crates/**"
      - "Cargo.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: make lint-rust
      - run: make test-rust

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Python v-${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies and build Rust extension
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev,extract]"
          uv run maturin develop --release
      - run: make lint-python
      - run: make test-python

  benchmark:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Build benchmarks
        run: cargo bench --workspace --no-run

      - name: Run Criterion benchmarks
        id: bench
        run: |
          cargo bench --workspace 2>&1 | tee bench_output.txt
          {
            echo "body<<BENCH_EOF"
            cat bench_output.txt
            echo "BENCH_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract benchmark results from Criterion JSON
        run: |
          python3 -c "
          import json, pathlib, sys
          results = []
          base = pathlib.Path('target/criterion')
          if not base.exists():
              print('No target/criterion directory found', file=sys.stderr)
              sys.exit(1)
          for est in sorted(base.rglob('new/estimates.json')):
              data = json.loads(est.read_text())
              parts = est.relative_to(base).parts
              name = '/'.join(parts[:-2])  # group/bench
              median_ns = data['median']['point_estimate']
              results.append({'name': name, 'unit': 'ns', 'value': median_ns})
          pathlib.Path('bench_output.json').write_text(json.dumps(results, indent=2))
          print(f'Extracted {len(results)} benchmark results')
          "

      - name: Post benchmark results to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: benchmark
          message: |
            ## Benchmark Results (Criterion)
            <details>
            <summary>Click to expand</summary>
            ```
            ${{ steps.bench.outputs.body }}
            ```
            </details>

      - name: Download previous benchmark data
        uses: actions/cache@v5
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark

      - name: Benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: "customSmallerIsBetter"
          output-file-path: bench_output.json
          external-data-json-path: ./cache/benchmark-data.json
          fail-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
          comment-always: true
          alert-threshold: "125%"
          comment-on-alert: true
          alert-comment-cc-users: "@nwaughachukwuma"
