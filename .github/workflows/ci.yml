name: CI

on:
  pull_request:
    paths:
      - "python/mm/**"
      - "tests/python/**"
      - "pyproject.toml"
      - "crates/**"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"
  push:
    branches:
      - main
    paths:
      - "python/mm/**"
      - "pyproject.toml"
      - "crates/**"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version_check.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check if version changed
        id: version_check
        run: |
          CURRENT=$(python3 -c "import re, pathlib; print(re.search(r'version\s*=\s*\"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text()).group(1))")
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          else
            BASE_REF="HEAD~1"
          fi
          BASE=$(git show "${BASE_REF}:pyproject.toml" 2>/dev/null | python3 -c "import re,sys; m=re.search(r'version\s*=\s*\"([^\"]+)\"', sys.stdin.read()); print(m.group(1) if m else '')" || echo '')
          if [ "$CURRENT" != "$BASE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: $BASE -> $CURRENT"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $CURRENT"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Quality Check (pre-commit)
        uses: pre-commit/action@v3.0.1

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-stable
          cache-on-failure: true
      - run: make lint-rust
      - run: make test-rust

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Python v-${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-stable
          cache-on-failure: true

      - name: Restore pytest cache
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pytest-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies and build Rust extension
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - run: make lint-python
      - run: make test-python-fast

  # Full Python suite (fast + slow + integration). Runs on PRs when the
  # project version changes as a pre-merge gate. The slow tier includes
  # pytest-benchmark suites and CLI cold-start subprocess benchmarks that
  # add several minutes per run. Post-merge gating is handled by
  # publish.yml, which re-runs this suite before tagging a release.
  test-python-full:
    needs: check-version
    if: github.event_name == 'pull_request' && needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Python v-${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-stable
          cache-on-failure: true

      - name: Install dependencies and build Rust extension
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - run: make test-python-full

  benchmark:
    needs: check-version
    if: github.event_name == 'pull_request' && needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-bench
          cache-on-failure: true

      - run: cargo bench --workspace

      - name: Extract benchmark results from Criterion JSON
        run: |
          python3 -c "
          import json, pathlib, sys
          results = []
          base = pathlib.Path('target/criterion')
          if not base.exists():
              print('No target/criterion directory found', file=sys.stderr)
              sys.exit(1)
          for est in sorted(base.rglob('new/estimates.json')):
              data = json.loads(est.read_text())
              parts = est.relative_to(base).parts
              name = '/'.join(parts[:-2])  # group/bench
              median_ns = data['median']['point_estimate']
              results.append({'name': name, 'unit': 'ns', 'value': median_ns})
          pathlib.Path('bench_output.json').write_text(json.dumps(results, indent=2))
          print(f'Extracted {len(results)} benchmark results')
          "

      - name: Download previous benchmark data
        uses: actions/cache@v5
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark

      - name: Benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: "customSmallerIsBetter"
          output-file-path: bench_output.json
          external-data-json-path: ./cache/benchmark-data.json
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
          comment-always: true
          alert-threshold: "150%"
          comment-on-alert: true
          alert-comment-cc-users: "@nwaughachukwuma"
