name: CI

on:
  pull_request:
    paths:
      - "python/mm/**"
      - "tests/python/**"
      - "pyproject.toml"
      - "crates/**"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"
  push:
    branches:
      - main
    paths:
      - "python/mm/**"
      - "pyproject.toml"
      - "crates/**"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version_check.outputs.changed }}
      patch_bump: ${{ steps.version_check.outputs.patch_bump }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check if version changed
        id: version_check
        run: |
          CURRENT=$(python3 -c "import re, pathlib; print(re.search(r'version\s*=\s*\"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text()).group(1))")
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          else
            BASE_REF="HEAD~1"
          fi
          BASE=$(git show "${BASE_REF}:pyproject.toml" 2>/dev/null | python3 -c "import re,sys; m=re.search(r'version\s*=\s*\"([^\"]+)\"', sys.stdin.read()); print(m.group(1) if m else '')" || echo '')
          PATCH_BUMP=$(CURRENT="$CURRENT" BASE="$BASE" python3 -c "
          import os, re
          def triple(v):
              m = re.match(r'(\d+)\.(\d+)\.(\d+)', v or '')
              return tuple(int(g) for g in m.groups()) if m else None
          c, b = triple(os.environ['CURRENT']), triple(os.environ['BASE'])
          print('true' if c and b and c[0] == b[0] and c[1] == b[1] and c[2] != b[2] else 'false')
          ")
          if [ "$CURRENT" != "$BASE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: $BASE -> $CURRENT"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $CURRENT"
          fi
          echo "patch_bump=$PATCH_BUMP" >> $GITHUB_OUTPUT
          echo "Patch bump: $PATCH_BUMP"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Quality Check (pre-commit)
        uses: pre-commit/action@v3.0.1

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-stable
          cache-on-failure: true
      - run: make lint-rust
      - run: make test-rust

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Python v-${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-stable
          cache-on-failure: true

      - name: Restore pytest cache
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pytest-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies and build Rust extension
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - run: make lint-python
      - run: make test-python-fast

  test-python-full:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Python v-${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-stable
          cache-on-failure: true

      - name: Install dependencies and build Rust extension
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - run: make test-python-full

  test-encoders:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Python v-${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-stable
          cache-on-failure: true

      - name: Install dependencies and build Rust extension
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - run: uv run python scripts/test_encoders.py --kind image --kind document --mode fast --verbose

  tag:
    needs:
      [
        check-version,
        lint,
        test-rust,
        test-python,
        test-python-full,
        test-encoders,
      ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Tag release if new
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=${VERSION} tag=${TAG}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin — skipping"
            exit 0
          fi

          git config --global user.email "sudeep@vlm.run"
          git config --global user.name "Sudeep Pillai"

          echo "Creating tag ${TAG}"
          git tag "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
