name: CI

on:
  pull_request:
    paths:
      - "python/mm/**"
      - "tests/python/**"
      - "pyproject.toml"
      - "crates/**"
      - "Cargo.toml"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "python/mm/**"
      - "pyproject.toml"
      - "crates/**"
      - "Cargo.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: make lint-rust
      - run: make test-rust

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Python v-${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies and build Rust extension
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev,extract]"
          uv run maturin develop --release
      - run: make lint-python
      - run: make test-python

  benchmark:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Build benchmarks
        run: cargo bench --workspace --no-run

      - name: Run Criterion benchmarks
        id: bench
        run: |
          cargo bench --workspace -- --output-format bencher 2>&1 | tee full_bench_output.txt
          grep '^test ' full_bench_output.txt > bench_output.txt || true
          {
            echo "body<<BENCH_EOF"
            cat bench_output.txt
            echo "BENCH_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post benchmark results to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: benchmark
          message: |
            ## Benchmark Results (Criterion)
            <details>
            <summary>Click to expand</summary>
            ```
            ${{ steps.bench.outputs.body }}
            ```
            </details>

      - name: Download previous benchmark data
        uses: actions/cache@v5
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark

      - name: Benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: "cargo"
          output-file-path: bench_output.txt
          external-data-json-path: ./cache/benchmark-data.json
          fail-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
          comment-on-alert: true
          alert-comment-cc-users: "@nwaughachukwuma"
