name: Release to PyPI

# Triggers on version bumps landing on main. Pattern mirrors
# vlm-run/vlmrun-python-sdk: detect version change → run full integration
# tests + benchmarks → tag → build wheels → publish to PyPI → cut GitHub release.

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
      changed: ${{ steps.get.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version and detect change
        id: get
        run: |
          CURRENT=$(python3 -c "import re, pathlib; print(re.search(r'version\s*=\s*\"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text()).group(1))")
          echo "version=${CURRENT}" >> $GITHUB_OUTPUT
          echo "Current version: ${CURRENT}"

          BASE=$(git show HEAD~1:pyproject.toml 2>/dev/null \
            | python3 -c "import re,sys; m=re.search(r'version\s*=\s*\"([^\"]+)\"', sys.stdin.read()); print(m.group(1) if m else '')" \
            || echo '')
          echo "Previous version: ${BASE:-<none>}"

          if git rev-parse "v${CURRENT}" >/dev/null 2>&1; then
            echo "Tag v${CURRENT} already exists — skipping release"
            echo "changed=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — releasing v${CURRENT}"
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "$CURRENT" != "$BASE" ]; then
            echo "Version bumped: ${BASE} -> ${CURRENT}"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged — skipping release"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  # Full Python suite (fast + slow + integration). Gate on version bumps.
  test-full:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-stable
          cache-on-failure: true
      - name: Install dependencies and build Rust extension
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - run: make test-rust
      - run: make test-python-full

  # Rust benchmark suite. Gate on version bumps to catch perf regressions
  # before we ship a release.
  benchmark:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-bench
          cache-on-failure: true
      - run: cargo bench --workspace

  # Create and push the version tag once all gates pass. Everything
  # downstream (build / publish / release) keys off this tag.
  tag:
    needs: [check-version, test-full, benchmark]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    outputs:
      tag: v${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create and push tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping"
          else
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
          fi

  # Build wheels for each platform.
  build:
    needs: [check-version, tag]
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux aarch64 (cross-compiled)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # macOS x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.check-version.outputs.version }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Verify wheel contents
        if: runner.os != 'Windows'
        run: make dist-verify DIST_DIR=dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # Publish wheels to PyPI (no sdist — compiled libs + Python only).
  publish:
    needs: [check-version, build]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    environment:
      name: pypi
      url: https://pypi.org/p/mm-ctx
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.check-version.outputs.version }}
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Remove sdist tarballs and verify wheels
        run: |
          rm -f dist/*.tar.gz
          make dist-verify DIST_DIR=dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: :python: *mm-ctx v${{ env.VERSION }} Published to PyPI*\n\n*Version:* `v${{ env.VERSION }}`\n*Platforms:* linux (x86_64, aarch64), macOS (x86_64, arm64), Windows (x86_64)\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: :python: *mm-ctx Publish Failed*\n\n*Version:* `v${{ env.VERSION }}`\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

  create-release:
    needs: [check-version, publish]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: v${{ needs.check-version.outputs.version }}
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "v${VERSION}^" 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"* %s (%h)" > RELEASE_NOTES.md
          else
            echo "## Changes since ${PREVIOUS_TAG}" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log --pretty=format:"* %s (%h)" "${PREVIOUS_TAG}..v${VERSION}" >> RELEASE_NOTES.md
          fi
          echo "" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...v${VERSION}" >> RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: dist/*

  # Deploy metrics dashboard to GitHub Pages at /dev/metrics
  deploy-metrics:
    needs: [check-version, publish]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/metrics/package-lock.json
      - name: Install dependencies
        working-directory: web/metrics
        run: npm ci
      - name: Build metrics dashboard
        working-directory: web/metrics
        env:
          VITE_BASE_PATH: /mm/dev/metrics/
        run: npm run build
      - name: Deploy metrics to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/metrics/dist
          destination_dir: dev/metrics
          keep_files: true

  deploy-installer:
    needs: [check-version, publish]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.check-version.outputs.version }}
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Stage installer directory
        run: |
          mkdir -p _pages/${VERSION}
          mkdir -p _pages/latest

          # Copy wheels into versioned directory
          cp dist/*.whl _pages/${VERSION}/

          # Generate SHA256 checksums manifest
          cd _pages/${VERSION}
          sha256sum *.whl > SHA256SUMS
          echo "── SHA256SUMS (v${VERSION}) ──"
          cat SHA256SUMS
          cd ../..

          # Copy versioned artifacts to latest/ as well
          cp _pages/${VERSION}/*.whl _pages/latest/
          cp _pages/${VERSION}/SHA256SUMS _pages/latest/

          # Place install scripts at the root
          cp install.sh _pages/install.sh
          cp install.ps1 _pages/install.ps1

      - name: Deploy installer to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_pages
          destination_dir: install
          keep_files: true

  # Deploy intro docs site to GitHub Pages at /intro
  deploy-intro:
    needs: [check-version, publish]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/intro/package-lock.json
      - name: Install dependencies
        working-directory: web/intro
        run: npm ci
      - name: Build intro site
        working-directory: web/intro
        env:
          VITE_BASE_PATH: /mm/intro/
        run: npm run build
      - name: Deploy intro to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/intro/dist
          destination_dir: intro
          keep_files: true
