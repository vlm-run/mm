name: publish to pypi

# TODO: set dependency on publish in `create-release` and `deploy-install-script` jobs once ready to publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  integration-test:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies and build Rust extension
        run: |
          uv venv --python 3.10
          uv pip install -e ".[dev,extract,datasets]"
          uv run maturin develop --release
      - name: Run integration tests
        run: uv run pytest tests/python -m integration -v

  # Build wheels for each platform
  build:
    needs:
      - prepare
      - integration-test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux aarch64 (cross-compiled)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # macOS x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # Build source distribution
  sdist:
    needs:
      - prepare
      - integration-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  # Publish all wheels + sdist to PyPi. TODO: enable when ready to publish to PyPI
  publish:
    if: false
    needs:
      - prepare
      - build
      - sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    environment:
      name: pypi
      url: https://pypi.org/p/mm-ctx
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List dist contents
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: :python: *mm-ctx v${{ env.VERSION }} Published to PyPI*\n\n*Version:* `v${{ env.VERSION }}`\n*Platforms:* linux (x86_64, aarch64), macOS (x86_64, arm64)\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: :python: *mm-ctx Publish Failed*\n\n*Tag:* `${{ github.ref_name }}`\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

  # Create GitHub release with wheel assets
  create-release:
    needs:
      - prepare
      - build
      - sdist
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"* %s" > RELEASE_NOTES.md
          else
            git log --pretty=format:"* %s" $PREVIOUS_TAG..HEAD > RELEASE_NOTES.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: dist/*

  # Deploy metrics dashboard to GitHub Pages at /dev/metrics
  deploy-metrics:
    needs:
      - build
      - sdist
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: metrics
        run: npm ci
      - name: Build metrics dashboard
        working-directory: metrics
        env:
          VITE_BASE_PATH: /mm/dev/metrics/
        run: npm run build
      - name: Deploy metrics to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./metrics/dist
          destination_dir: dev/metrics
          keep_files: true

  # Deploy installer + wheels + checksums to GitHub Pages at /dev/installer
  deploy-installer:
    needs:
      - prepare
      - build
      - sdist
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Stage installer directory
        run: |
          mkdir -p _installer/${VERSION}
          mkdir -p _installer/latest

          # Copy wheels into versioned directory
          cp dist/*.whl _installer/${VERSION}/

          # Generate SHA256 checksums manifest
          cd _installer/${VERSION}
          sha256sum *.whl > SHA256SUMS
          echo "── SHA256SUMS (v${VERSION}) ──"
          cat SHA256SUMS
          cd ../..

          # Copy versioned artifacts to latest/ as well
          cp _installer/${VERSION}/*.whl _installer/latest/
          cp _installer/${VERSION}/SHA256SUMS _installer/latest/

          # Place install.sh at the root of the installer path
          cp install.sh _installer/install.sh

      - name: Deploy installer to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_installer
          destination_dir: dev/installer
          keep_files: true

  # Deploy PEP 503 simple repository index for `uv tool install mm`
  # Usage: uv tool install mm --index-url https://vlm-run.github.io/mm/dev/installer/simple/
  deploy-simple-index:
    needs:
      - prepare
      - build
      - deploy-installer
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    permissions:
      contents: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Generate PEP 503 simple index
        run: |
          BASE="https://vlm-run.github.io/mm/dev/installer"
          mkdir -p _simple/mm

          # Root index: lists the package name
          echo '<!DOCTYPE html><html><body><a href="mm/">mm</a></body></html>' > _simple/index.html

          # Package index: lists all wheels with sha256 hash fragments
          {
            echo '<!DOCTYPE html>'
            echo '<html><body>'
            for whl in dist/*.whl; do
              FNAME="$(basename "$whl")"
              HASH="$(sha256sum "$whl" | cut -d' ' -f1)"
              echo "  <a href=\"${BASE}/${VERSION}/${FNAME}#sha256=${HASH}\">${FNAME}</a>"
            done
            echo '</body></html>'
          } > _simple/mm/index.html

          echo "── PEP 503 index ──"
          cat _simple/mm/index.html

      - name: Deploy simple index to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_simple
          destination_dir: dev/installer/simple
          keep_files: true
