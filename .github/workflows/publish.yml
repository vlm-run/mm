name: publish to pypi

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version_check.outputs.changed }}
      version: ${{ steps.version_check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check if version changed
        id: version_check
        run: |
          CURRENT=$(python3 -c "import re, pathlib; print(re.search(r'version\s*=\s*\"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text()).group(1))")
          BASE=$(git show HEAD~1:pyproject.toml 2>/dev/null | python3 -c "import re,sys; m=re.search(r'version\s*=\s*\"([^\"]+)\"', sys.stdin.read()); print(m.group(1) if m else '')" || echo '')
          if [ "$CURRENT" != "$BASE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            echo "Version changed: $BASE -> $CURRENT"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            echo "Version unchanged: $CURRENT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  verify-wheels:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Verify no Rust source in wheels
        run: |
          echo "Checking wheels for Rust source leaks..."
          for whl in dist/*.whl; do
            echo "  Inspecting $(basename "$whl")"
            if unzip -l "$whl" | grep -qE '\.(rs)$|Cargo\.toml|/crates/'; then
              echo "ERROR: Rust source found in $whl"
              unzip -l "$whl" | grep -E '\.(rs)$|Cargo\.toml|/crates/'
              exit 1
            fi
          done
          echo "All wheels verified: no Rust source found"

  create-tag:
    needs:
      - check-version
      - verify-wheels
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ needs.check-version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create and push tag
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

  create-release:
    needs:
      - check-version
      - create-tag
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Generate changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"* %s" > RELEASE_NOTES.md
          else
            git log --pretty=format:"* %s" $PREVIOUS_TAG..HEAD > RELEASE_NOTES.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: dist/*

  publish:
    needs:
      - check-version
      - verify-wheels
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    environment:
      name: pypi
      url: https://pypi.org/p/mm-ctx
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List dist contents
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: :python: *mm-ctx v${{ env.VERSION }} Published to PyPI*\n\n*Version:* `v${{ env.VERSION }}`\n*Platforms:* linux (x86_64, aarch64), macOS (x86_64, arm64), Windows (x86_64, arm64)\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: :python: *mm-ctx Publish Failed*\n\n*Version:* `v${{ env.VERSION }}`\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

  deploy-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: web/metrics
        run: npm ci
      - name: Build metrics dashboard
        working-directory: web/metrics
        env:
          VITE_BASE_PATH: /mm/dev/metrics/
        run: npm run build
      - name: Deploy metrics to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/metrics/dist
          destination_dir: dev/metrics
          keep_files: true

  deploy-installer:
    needs:
      - check-version
      - build
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Stage installer directory
        run: |
          mkdir -p _pages/${VERSION}
          mkdir -p _pages/latest
          mkdir -p _pages/simple/mm

          cp dist/*.whl _pages/${VERSION}/

          cd _pages/${VERSION}
          sha256sum *.whl > SHA256SUMS
          echo "── SHA256SUMS (v${VERSION}) ──"
          cat SHA256SUMS
          cd ../..

          cp _pages/${VERSION}/*.whl _pages/latest/
          cp _pages/${VERSION}/SHA256SUMS _pages/latest/

          cp install.sh _pages/install.sh
          cp install.ps1 _pages/install.ps1

      - name: Deploy installer to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_pages
          destination_dir: install
          keep_files: true

  deploy-simple-index:
    needs:
      - check-version
      - deploy-installer
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    permissions:
      contents: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Generate PEP 503 simple index
        run: |
          BASE="https://vlm-run.github.io/mm/install"
          mkdir -p _simple/mm

          echo '<!DOCTYPE html><html><body><a href="mm/">mm</a></body></html>' > _simple/index.html

          {
            echo '<!DOCTYPE html>'
            echo '<html><body>'
            for whl in dist/*.whl; do
              FNAME="$(basename "$whl")"
              HASH="$(sha256sum "$whl" | cut -d' ' -f1)"
              echo "  <a href=\"${BASE}/${VERSION}/${FNAME}#sha256=${HASH}\">${FNAME}</a>"
            done
            echo '</body></html>'
          } > _simple/mm/index.html

          echo "── PEP 503 index ──"
          cat _simple/mm/index.html

      - name: Deploy simple index to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_simple
          destination_dir: install/simple
          keep_files: true

  deploy-intro:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: web/intro
        run: npm ci
      - name: Build intro site
        working-directory: web/intro
        env:
          VITE_BASE_PATH: /mm/intro/
        run: npm run build
      - name: Deploy intro to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/intro/dist
          destination_dir: intro
          keep_files: true
