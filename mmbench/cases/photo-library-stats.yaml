id: photo-library-stats
title: Count the photo library at scale and report its largest subfolder
archetype: retrieval
modality: [image]
dataset: mmbench-agent/Photos
mm_commands: [sql, wc, find]
difficulty: medium
prompt: |
  Survey this photo library, including every subfolder. Report the total number
  of image files it contains, and name the immediate subfolder of Photos/ that
  holds the most photos.
ground_truth:
  total_images: 158
  note: "library has 8 needles; 2023/2024/unsorted hold 50 each"
checks:
  - { kind: contains_number, value: "158", weight: 2 }
judge_objective: |
  The response reports 158 image files in total across the Photos tree. A count
  off by one or two is acceptable if the agent shows its method; a wildly wrong
  count (e.g. only the 8 in library/) is not.
