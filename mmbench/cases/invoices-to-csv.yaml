id: invoices-to-csv
title: Build a spreadsheet of every invoice total across PDF and image invoices
archetype: artifact
modality: [pdf, image]
dataset: mmbench-agent/Downloads
mm_commands: [cat, grep, find]
difficulty: hard
prompt: |
  This Downloads folder contains invoices in more than one format (PDF and
  image). Read every invoice and build a CSV file named invoices.csv in the top
  level of this folder. Use the header 'file,total_amount,currency' and write one
  row per invoice: file is the invoice's filename, total_amount is the total
  amount due as a plain number (no thousands separators), currency is the
  three-letter code.
ground_truth:
  rows:
    - { file: scan_4471.pdf, total_amount: 381.12, currency: EUR }
    - { file: IMG_2235.jpg, total_amount: 4647.68, currency: USD }
checks:
  - { kind: artifact_exists, path: invoices.csv, weight: 1 }
  - { kind: artifact_row_count, path: invoices.csv, count: 2, weight: 1 }
  - { kind: artifact_contains, path: invoices.csv, value: "381.12", weight: 1 }
  - { kind: artifact_contains, path: invoices.csv, value: "4647.68", weight: 1 }
judge_objective: |
  invoices.csv has two data rows: the CPB PDF invoice (scan_4471.pdf) totaling
  381.12 EUR and the Google image invoice (IMG_2235.jpg) totaling 4647.68 USD.
  Accept totals with or without thousands separators. Penalize a missing invoice
  (especially the image one), wrong totals, or wrong currencies.
