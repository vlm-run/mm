id: tree-kind-audit
title: Audit a large mixed directory tree by file count and dominant kind
archetype: retrieval
modality: [mixed]
dataset: mmbench-agent
mm_commands: [wc, sql, find]
difficulty: medium
prompt: |
  Survey this entire directory tree, including every subfolder. Report the total
  number of files it contains and which single media kind (image, document,
  audio, or video) accounts for the most files.
ground_truth:
  total_files: 180
  dominant_kind: image
checks:
  - { kind: contains_number, value: "180", weight: 2 }
  - { kind: contains_text, value: "image", weight: 1 }
judge_objective: |
  The response reports 180 files total (excluding the manifest) and identifies
  image as the dominant media kind. A count within a file or two is acceptable if
  the agent explains its counting; the dominant kind must be image.
