id: paper-pages-report
title: Find the research paper and report its page count to a file
archetype: artifact
modality: [pdf]
dataset: mmbench-agent/Documents
mm_commands: [peek, cat, find]
difficulty: medium
prompt: |
  Find the research-paper PDF in this document tree and determine how many pages
  it has. Write a plain-text file named pages.txt at the top level containing just
  the page count as a number.
ground_truth:
  file: Documents/papers/paper_attn.pdf
  pages: 15
checks:
  - { kind: artifact_exists, path: pages.txt, weight: 1 }
  - { kind: artifact_contains, path: pages.txt, value: "15", weight: 2 }
judge_objective: |
  pages.txt reports 15 pages for the research paper (paper_attn.pdf). Penalize a
  wrong page count.
