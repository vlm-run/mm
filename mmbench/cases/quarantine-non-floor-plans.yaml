id: quarantine-non-floor-plans
title: Keep only true floor plans in place, move the rest into a side folder
archetype: organization
modality: [image]
dataset: mmbench-agent/Documents/plans
mm_commands: [cat, find]
difficulty: hard
prompt: |
  This folder is supposed to contain only architectural floor plans, but a couple
  of other technical drawings got mixed in. Inspect each drawing. Create a
  subfolder named _other/ and move every file that is NOT a floor plan into it
  (for example an HVAC symbol legend or a page layout). Leave the actual floor
  plans where they are.
ground_truth:
  move_to_other: [DSC_0507.webp, DSC_0508.jpg]
  keep_in_place: [DSC_0501.png, DSC_0502.png, DSC_0503.jpg, DSC_0504.avif, DSC_0505.jpg, DSC_0506.gif]
checks:
  - { kind: path_exists, path: _other/DSC_0507.webp, weight: 2 }
  - { kind: path_exists, path: _other/DSC_0508.jpg, weight: 2 }
  - { kind: path_exists, path: DSC_0501.png, weight: 1 }
  - { kind: path_absent, path: _other/DSC_0501.png, weight: 1 }
judge_objective: |
  Only the HVAC symbol sheet (DSC_0507.webp) and the page layout (DSC_0508.jpg)
  are moved into _other/; all six floor plans (DSC_0501-0506) remain in place.
  Penalize moving a real floor plan or leaving a non-floor-plan behind.
