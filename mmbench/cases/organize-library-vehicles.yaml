id: organize-library-vehicles
title: Move only the vehicle photos into a vehicles subfolder
archetype: organization
modality: [image]
dataset: mmbench-agent/Photos/library
mm_commands: [cat, find]
difficulty: hard
prompt: |
  Look at each photo in this folder. Create a subfolder named vehicles/ and move
  into it every photo whose main subject is a vehicle (a car, bus, truck, boat,
  or aircraft). Leave all other photos (people, objects, scenery) where they are.
ground_truth:
  move_to_vehicles: [IMG_1001.jpg, IMG_1002.avif, IMG_1006.png]
  keep_in_place: [IMG_1003.png, IMG_1004.png, IMG_1005.png, IMG_1007.jpg, IMG_1008.webp]
checks:
  - { kind: path_exists, path: vehicles/IMG_1001.jpg, weight: 1 }
  - { kind: path_exists, path: vehicles/IMG_1002.avif, weight: 1 }
  - { kind: path_exists, path: vehicles/IMG_1006.png, weight: 1 }
  - { kind: path_exists, path: IMG_1004.png, weight: 1 }
  - { kind: path_absent, path: vehicles/IMG_1004.png, weight: 1 }
judge_objective: |
  The bus (IMG_1001), boats (IMG_1002), and truck/container (IMG_1006) are moved
  into vehicles/, while the crowd (IMG_1004), bottles (IMG_1005), aerial photo
  (IMG_1007), and workers (IMG_1008) stay put. Penalize moving a non-vehicle or
  missing a vehicle.
