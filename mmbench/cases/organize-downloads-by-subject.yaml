id: organize-downloads-by-subject
title: Sort loose Downloads photos into subject folders by what they depict
archetype: organization
modality: [image]
dataset: mmbench-agent/Downloads
mm_commands: [cat, find, peek]
difficulty: medium
prompt: |
  The image files sitting directly in this Downloads folder (not in any
  subfolder) need sorting. Look at what each image depicts and move it into a
  subfolder named by subject, using exactly these names: animals/, vehicles/,
  documents/. Create folders as needed. Move only the loose image files; leave
  the existing invoices/ subfolder and any non-image files (audio, etc.) in place.
ground_truth:
  moves:
    Downloads/IMG_2231.jpg: Downloads/vehicles/IMG_2231.jpg
    Downloads/IMG_2232.jpg: Downloads/animals/IMG_2232.jpg
    Downloads/IMG_2233.png: Downloads/vehicles/IMG_2233.png
    Downloads/IMG_2234.jpg: Downloads/animals/IMG_2234.jpg
    Downloads/IMG_2235.jpg: Downloads/documents/IMG_2235.jpg
checks:
  - { kind: path_exists, path: vehicles/IMG_2231.jpg, weight: 1 }
  - { kind: path_exists, path: animals/IMG_2232.jpg, weight: 1 }
  - { kind: path_exists, path: vehicles/IMG_2233.png, weight: 1 }
  - { kind: path_exists, path: animals/IMG_2234.jpg, weight: 1 }
  - { kind: path_exists, path: documents/IMG_2235.jpg, weight: 1 }
  - { kind: path_exists, path: rec_0042.mp3, weight: 1 }
judge_objective: |
  The car (IMG_2231) and airplanes (IMG_2233) end up under vehicles/, the dogs
  (IMG_2232) and cats (IMG_2234) under animals/, and the invoice image (IMG_2235)
  under documents/. The audio file rec_0042.mp3 and the invoices/ subfolder are
  left untouched. Penalize misclassifications or disturbing the non-image files.
