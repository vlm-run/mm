id: retrieve-balance-sheet-company
title: Identify the balance sheet among financial documents and name its company
archetype: retrieval
modality: [image]
dataset: mmbench-agent/Documents/financial
mm_commands: [cat, grep]
difficulty: medium
prompt: |
  This folder holds several financial-document images (filings, tables, and a
  balance sheet). Identify which file is a company's consolidated balance sheet,
  give its filename, and name the company it belongs to.
ground_truth:
  file: DSC_0601.jpg
  company: Alphabet
checks:
  - { kind: names_file, path: DSC_0601.jpg, weight: 2 }
  - { kind: contains_text, value: "Alphabet", weight: 2 }
judge_objective: |
  The response identifies DSC_0601.jpg as the consolidated balance sheet and
  names the company as Alphabet Inc. Penalize naming a different file (e.g. the
  10-K form pages or the benchmark table) or the wrong company.
