id: invoice-extract-json
title: Extract structured fields from a PDF invoice into JSON
archetype: artifact
modality: [pdf]
dataset: mmbench-agent/Downloads
mm_commands: [cat, grep, find]
difficulty: hard
prompt: |
  Find the PDF invoice in this folder and write a JSON file named invoice.json at
  the top level with exactly these keys: "invoice_no", "issuer", "customer", and
  "total" (the total amount due as a number). Read the values from the invoice.
ground_truth:
  invoice_no: "123100401"
  issuer: CPB Software (Germany) GmbH
  customer: Musterkunde AG
  total: 381.12
checks:
  - { kind: artifact_exists, path: invoice.json, weight: 1 }
  - { kind: artifact_contains, path: invoice.json, value: "123100401", weight: 1 }
  - { kind: artifact_contains, path: invoice.json, value: "Musterkunde", weight: 1 }
  - { kind: artifact_contains, path: invoice.json, value: "381.12", weight: 1 }
judge_objective: |
  invoice.json contains invoice_no 123100401, issuer CPB Software (Germany) GmbH,
  customer Musterkunde AG, and total 381.12. Penalize wrong/missing fields or
  malformed JSON.
