id: retrieve-video-product
title: Watch the video and report the company's signature product
archetype: retrieval
modality: [video]
dataset: mmbench-agent/Media
mm_commands: [cat]
difficulty: hard
prompt: |
  This folder contains a short documentary-style video about a family business.
  Report the name of the business as it operates today, and the single signature
  product it is known for making.
ground_truth:
  file: Media/clip_bakery.mp4
  company: 5 Generation Bakers
  product: cinnamon swirl bread
checks:
  - { kind: contains_text, value: "swirl bread", weight: 2 }
  - { kind: contains_text, value: "cinnamon", weight: 1 }
  - { kind: contains_text, value: "Generation Bakers", weight: 1 }
judge_objective: |
  The response identifies the business as 5 Generation Bakers (the relaunched
  Jenny Lee bakery) and its signature product as cinnamon swirl bread (Jenny Lee
  Swirl Bread). Penalize a wrong product or company; the agent must have actually
  understood the video content, not guessed.
