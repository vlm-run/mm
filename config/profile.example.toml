# ~/.config/mm/mm.toml
#
# mm configuration file.
# Copy to ~/.config/mm/mm.toml and edit to your needs.
# Generate with: mm config init

# ── Active profile ──────────────────────────────────────────────────
# Switch with:  mm profile use <name>
# Per-command:  mm --profile vlmrun cat photo.png -l 2
# Env var:      MM_PROFILE=vlmrun mm cat photo.png -l 2
active_profile = "default"

# ── Profiles (LLM provider configs) ────────────────────────────────
# Each profile has: base_url, api_key, model
# List all:     mm profile list
# Add new:      mm profile add <name> --base-url <url> --model <model>
# Update:       mm profile update <name> --api-key <key>

[profile.default]
# Ollama (local, default)
base_url = "http://localhost:11434"
api_key = ""
model = "qwen3.5:0.8b"

