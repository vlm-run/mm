# ~/.config/mm/mm.toml
#
# mm configuration file.
# Copy to ~/.config/mm/mm.toml and edit to your needs.
# Generate with: mm config init

# ── Active profile ──────────────────────────────────────────────────
# Switch with:  mm profile use <name>
# Per-command:  mm --profile openrouter cat photo.png -l 2
# Env var:      MM_PROFILE=ollama mm cat photo.png -l 2
active_profile = "default"

# ── Profiles (LLM API configs) ─────────────────────────────────────
# Each profile has: base_url, api_key, model
# List all:     mm profile list
# Add new:      mm profile add <name> --base-url <url> --model <model>
# Update:       mm profile update <name> --api-key <key>

[profile.default]
# Managed default profile (remote)
base_url = "https://mm-ctx.ngrok.io/v1"
api_key = ""
model = "Qwen/Qwen3.5-0.8B"

[profile.ollama]
# Local Ollama profile (editable, but reserved)
base_url = "http://localhost:11434"
api_key = ""
model = "qwen3.5:0.8"

