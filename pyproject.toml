[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "mm"
version = "0.2.1"
description = "High-performance multi-modal context management library"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "typer>=0.12",
    "rich>=13.0",
    "polars>=1.0",
    "pandas>=2.0",
    "duckdb>=1.0",
    "pyarrow>=15.0",
    "pypdfium2>=4.0",
    "Pillow>=10.0",
    "openai>=1.0",
    "tomli>=1.0; python_version < '3.11'",
    "lancedb==0.25.3",
]

[project.scripts]
mm = "mm.cli:app"

[project.optional-dependencies]
extract = [
    "torch>=2.0",
    "faster-whisper>=1.0",
    "scenedetect[opencv]>=0.6",
    "docling>=2.0",
    "ctranslate2>=2.0",
]
dataset = [
    "datasets>=2.0",
]
mlx = [
    "mlx>=0.31.1",
    "lightning-whisper-mlx>=0.0.10",
]
dev = [
    "pytest>=8.0",
    "pytest-benchmark>=4.0",
    "mypy>=1.10",
    "ruff>=0.4",
    "maturin>=1.7",
]

[tool.maturin]
python-source = "python"
module-name = "mm._mm"
manifest-path = "crates/mm-python/Cargo.toml"
features = ["pyo3/extension-module"]

[tool.pytest.ini_options]
testpaths = ["tests/python"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pyright]
reportMissingImports = "none"
