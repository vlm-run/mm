kind: document
mode: accurate

encode:
  strategy: page-text
  strategy_opts:
    pages_per_message: 1

generate:
  prompt: >-
    Structure this document ({filename}) into a clean markdown readable format.
    The conversion should be lossless and well-organized/formatted with proper headings, lists, etc.

    ```text
    {content}
    ```
  max_tokens: 16384
