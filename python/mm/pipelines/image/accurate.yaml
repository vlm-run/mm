kind: image
mode: accurate

encode:
  strategy: image-resize
  strategy_opts:
    max_width: 1024

generate:
  prompt: >-
    Describe this image in detail (~200 words).
    Then list up to 10 keyword tags.
    Then list up to 10 identifiable objects, people, faces, or logos.

    ## FORMAT
    --description--

    Tags: Up to 10 keyword tags
    Objects: Up to 10 identifiable objects, people, faces, brands or logos
  max_tokens: 2048
