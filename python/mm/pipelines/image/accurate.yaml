kind: image
mode: accurate

encode:
  strategy: resize
  strategy_opts:
    max_width: 1024

generate:
  prompt: >-
    Describe this image in detail (~200 words).
    Then list up to 10 keyword tags.
    Then list up to 10 identifiable objects, people, faces, or logos.

    Use this format:
    ## Description
    <description>

    ## Tags
    - tag1
    - tag2
    ...

    ## Objects
    - object1
    - object2
    ...
  max_tokens: 1024
