kind: video
mode: fast

encode:
  strategy: video-mosaic
  strategy_opts:
    tile_cols: 4
    tile_rows: 4
    thumb_width: 160
    num_mosaics: 8
    num_frames: 128

generate:
  prompt: "Describe what's in this video in 50 words or less"
  max_tokens: 512
  think: false # disable thinking (default)
  reasoning_effort: "none" # no reasoning effort (default)
