ci:
  autofix_prs: true
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autofix suggestions"

repos:
  - repo: https://github.com/kynan/nbstripout
    rev: "0.7.1"
    hooks:
      - id: nbstripout
        # Strips outputs + execution_count from every notebook before commit
        # so we never check in MB-sized output blobs.
        files: \.ipynb$

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "v0.11.6"
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        entry: uvx ty@0.0.49 check python/mm/
        language: system
        pass_filenames: false
        require_serial: true
        args: []

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-docstring-first
        exclude: ^python/mm/(constants|encoders/__init__)\.py$
      - id: check-json
        exclude: ^tests/
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: \.ipynb$
      - id: trailing-whitespace
        exclude: \.ipynb$
      - id: check-added-large-files
        args: ["--maxkb=100"]
        exclude: ^tests/
